<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Archives of the Unknown — Live Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--red:#8b0000;--red-bright:#cc0000;--red-glow:#ff000033;
  --paper:#c8b99a;--text:#d4c9b0;--dim:#8a7d6a;
  --mono:'Share Tech Mono',monospace;--title:'Oswald',sans-serif;
}
html,body{height:100%;background:var(--black);color:var(--text);font-family:var(--mono)}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}
.tag{font-size:.65rem;letter-spacing:5px;color:var(--red-bright);text-align:center;margin-bottom:10px;text-transform:uppercase}
h1{font-family:var(--title);font-size:1.9rem;letter-spacing:.1em;color:#fff;text-align:center;text-transform:uppercase;line-height:1.2}
h2{font-family:var(--title);font-size:1.5rem;letter-spacing:.08em;color:#fff;text-transform:uppercase}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin:18px 0}
.card{background:rgba(16,10,6,.97);border:1px solid rgba(139,0,0,.25);border-top:3px solid var(--red-bright);padding:28px 24px;width:100%;max-width:480px}
.btn{width:100%;background:none;border:1px solid var(--red-bright);color:var(--red-bright);font-family:var(--mono);font-size:.82rem;letter-spacing:4px;padding:14px;cursor:pointer;transition:.25s;text-transform:uppercase}
.btn:hover{background:rgba(139,0,0,.3);box-shadow:0 0 20px var(--red-glow)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-green{border-color:#2a8a2a;color:#4caf50}.btn-green:hover{background:rgba(0,80,0,.3)}
.btn-red-dark{border-color:#8a1a1a;color:#ff5555}.btn-red-dark:hover{background:rgba(100,0,0,.3)}
input[type=text]{width:100%;background:rgba(25,15,10,.95);border:1px solid rgba(139,0,0,.4);color:var(--text);font-family:var(--mono);font-size:1rem;padding:14px;outline:none;margin:12px 0;letter-spacing:2px}
input:focus{border-color:var(--red-bright);box-shadow:0 0 10px rgba(200,0,0,.2)}
#score-badge{position:fixed;top:12px;right:12px;background:rgba(139,0,0,.3);border:1px solid rgba(200,0,0,.4);padding:6px 14px;font-size:.7rem;letter-spacing:2px;color:var(--red-bright);display:none;z-index:100}
.ans-btn{width:100%;background:rgba(18,12,8,.97);border:1px solid rgba(139,0,0,.3);color:var(--text);font-family:var(--mono);font-size:.95rem;padding:13px 16px;cursor:pointer;transition:.2s;text-align:left;margin:5px 0;display:flex;gap:12px;align-items:flex-start}
.ans-btn:hover{background:rgba(70,15,5,.7);border-color:var(--red-bright)}
.ans-btn.correct{background:rgba(0,70,0,.45);border-color:#4caf50;color:#4caf50}
.ans-btn.wrong{background:rgba(90,0,0,.4);border-color:#cc0000;color:#ff6666}
.ans-btn.selected-wrong{background:rgba(100,0,0,.5);border-color:#ff4444;color:#ff8888}
.ans-key{color:var(--red-bright);min-width:18px;font-weight:bold}
.ans-btn.correct .ans-key{color:#4caf50}
.vote-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.bar-row{margin:10px 0}
.bar-lbl{font-size:.65rem;letter-spacing:3px;margin-bottom:5px;display:flex;justify-content:space-between}
.bar-track{height:26px;background:rgba(25,15,8,.9);border-radius:2px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:2px;transition:width .7s ease;display:flex;align-items:center;padding-left:8px;font-size:.65rem;letter-spacing:2px;white-space:nowrap}
.fill-yes{background:linear-gradient(90deg,#1a5a1a,#2a8a2a);color:#aaffaa}
.fill-no{background:linear-gradient(90deg,#5a1a1a,#8a2a2a);color:#ffaaaa}
.fill-nat{background:linear-gradient(90deg,#1a3a7a,#2a5acc);color:#aaccff}
.fill-a{background:linear-gradient(90deg,#4a1a6a,#7a2acc)}
.fill-b{background:linear-gradient(90deg,#1a3a6a,#2a5acc)}
.fill-c{background:linear-gradient(90deg,#1a5a3a,#2a8a5a)}
.fill-d{background:linear-gradient(90deg,#5a3a1a,#8a5a2a)}
.explanation{border-left:3px solid var(--red);background:rgba(139,0,0,.06);padding:14px 18px;font-size:.85rem;color:var(--dim);line-height:1.7;margin-top:14px}
.result-ok{color:#4caf50;font-size:1.1rem;letter-spacing:3px;margin:14px 0;text-align:center}
.result-no{color:#ff5555;font-size:1.1rem;letter-spacing:3px;margin:14px 0;text-align:center}
.answered-box{background:rgba(139,0,0,.1);border:1px solid rgba(139,0,0,.3);padding:20px;text-align:center;font-size:.8rem;letter-spacing:3px;color:var(--dim);margin-top:16px}
.waiting-anim{color:var(--dim);font-size:.75rem;letter-spacing:4px;text-align:center;margin-top:20px}
.lb-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid rgba(139,0,0,.1)}
.lb-rank{color:var(--red-bright);min-width:32px;font-size:.9rem}
.lb-name{flex:1}
.lb-score{color:var(--red-bright);font-size:1.1rem;font-family:var(--title)}
.lb-row.me{color:#fff;background:rgba(139,0,0,.1);padding-left:8px;margin:0 -8px}
#host-wrap{display:grid;grid-template-columns:1fr 300px;height:100vh;width:100%;max-width:1300px}
#host-main{padding:36px 50px;overflow-y:auto;border-right:1px solid rgba(139,0,0,.2)}
#host-side{padding:24px 20px;background:#060402;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
#host-topbar{background:#0f0800;border-bottom:1px solid rgba(139,0,0,.35);padding:10px 30px;display:flex;align-items:center;justify-content:space-between;width:100%;position:sticky;top:0;z-index:50}
.logo{font-family:var(--title);font-size:1rem;letter-spacing:.2em;color:#fff}
#host-phase{font-size:.65rem;letter-spacing:4px;color:var(--red-bright)}
#host-pcount{font-size:.65rem;letter-spacing:2px;color:var(--dim)}
.next-btn{width:100%;background:none;border:2px solid var(--red-bright);color:var(--red-bright);font-family:var(--mono);font-size:.85rem;letter-spacing:4px;padding:15px;cursor:pointer;transition:.3s;position:sticky;bottom:0;margin-top:auto}
.next-btn:hover{background:rgba(139,0,0,.3);box-shadow:0 0 30px var(--red-glow);letter-spacing:6px}
.player-pill{background:rgba(20,12,8,.9);border:1px solid rgba(139,0,0,.2);padding:6px 10px;font-size:.68rem;letter-spacing:2px;color:var(--paper);margin-bottom:4px}
.qr-box{background:#ffffff;border:10px solid #ffffff;border-radius:6px;display:inline-block;box-shadow:0 0 60px rgba(255,255,255,0.18),0 0 120px rgba(255,255,255,0.07)}
.live-big{font-family:var(--title);font-size:3rem;color:var(--red-bright);line-height:1}
.opt-row{padding:10px 14px;border:1px solid rgba(139,0,0,.2);margin:5px 0;font-size:.9rem;display:flex;align-items:flex-start;gap:12px}
.opt-key{color:var(--red-bright);min-width:20px;font-weight:bold}
.stat-note{font-size:.65rem;color:#5a6a7a;letter-spacing:2px;margin-top:6px;line-height:1.6}
.hbar-row{margin:12px 0}
.hbar-lbl{font-size:.68rem;letter-spacing:3px;margin-bottom:5px;display:flex;justify-content:space-between;color:var(--paper)}
.q-text{font-size:1.1rem;color:#e8dfc8;line-height:1.7;margin:14px 0}
.topic-badge{display:inline-block;font-size:.65rem;letter-spacing:4px;color:var(--red-bright);border:1px solid rgba(139,0,0,.3);padding:3px 10px;margin-bottom:10px}
/* Setup screen */
.setup-step{display:flex;align-items:flex-start;gap:12px;margin:10px 0;font-size:.82rem;color:var(--dim);line-height:1.7}
.setup-num{color:var(--red-bright);font-family:var(--title);font-size:1.1rem;min-width:22px}
@media(max-width:700px){
  #host-wrap{grid-template-columns:1fr}
  #host-side{display:none}
  #host-main{padding:24px 18px}
}
</style>
</head>
<body>
<div id="score-badge">SCORE: <span id="sc">0</span>/6</div>
<div id="app" style="width:100%"></div>

<script>
// ── FIREBASE REST HELPERS ─────────────────────────────────────────────────────
let DB = '';

async function fbGet(path) {
  try {
    const r = await fetch(`${DB}/${path}.json`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fbSet(path, data) {
  try {
    await fetch(`${DB}/${path}.json`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
  } catch(e) { console.error('fbSet:', e); }
}

async function fbDel(path) {
  try { await fetch(`${DB}/${path}.json`, {method:'DELETE'}); } catch {}
}

// ── GAME DATA ─────────────────────────────────────────────────────────────────
const POLLS = [
  {n:1, topic:'Moon Landing',      question:'Do you believe the Moon landing was faked?',                                       stat:20, statLabel:'20% of Americans believe the landing was staged (YouGov 2019)'},
  {n:2, topic:'JFK Assassination', question:'Do you believe there was a conspiracy behind JFK\'s assassination?',               stat:61, statLabel:'61% of Americans suspect a conspiracy (Gallup 2023)'},
  {n:3, topic:'Area 51 & Roswell', question:'Do you believe the US government hides evidence of extraterrestrial life?',        stat:56, statLabel:'56% believe the government conceals UFO information (Gallup 2021)'},
  {n:4, topic:'9/11 Inside Job',   question:'Do you believe the US government was involved in planning 9/11?',                  stat:36, statLabel:'36% of Americans suspected government involvement (Scripps 2006)'},
  {n:5, topic:'Rothschild',        question:'Do you believe one family secretly controls global finance?',                      stat:12, statLabel:'~12% believe in a secret financial world control (YouGov 2018)'},
  {n:6, topic:'Israeli Lobby',     question:'Do you believe the Israeli lobby exerts excessive control over US foreign policy?', stat:31, statLabel:'31% of Americans think Israel has too much influence on US policy (Pew 2022)'},
];

const QUIZ = [
  {n:1, topic:'Moon Landing',
   question:'What did the Soviet Union do after the US claimed to land on the Moon?',
   options:{A:'Publicly announced it was fake', B:'Tracked the mission — and said nothing', C:'Filed a formal UN complaint', D:'Congratulated NASA publicly'},
   correct:'B',
   explanation:'The USSR had the technology to track Apollo independently. They followed every second of the mission and never disputed it — because they knew it was real.'},
  {n:2, topic:'JFK Assassination',
   question:'Which official US body concluded JFK was "probably killed as a result of a conspiracy"?',
   options:{A:'The Warren Commission (1964)', B:'The CIA Internal Review (1967)', C:'The House Select Committee on Assassinations (1979)', D:'The Senate Intelligence Committee (1975)'},
   correct:'C',
   explanation:'The HSCA (1979) directly contradicted the Warren Commission. Two official US government investigations reached opposite conclusions — and some files remain classified today.'},
  {n:3, topic:'Area 51 & Roswell',
   question:'What was "Project Mogul" — the real explanation behind the Roswell incident?',
   options:{A:'A program to contact alien civilizations', B:'A classified balloon to monitor Soviet nuclear tests', C:'The original codename for Area 51', D:'A failed Soviet spy mission on US soil'},
   correct:'B',
   explanation:'Project Mogul used high-altitude balloons to spy on Soviet nuclear activity. The rushed 24-hour retraction was about hiding the spy program — not alien bodies.'},
  {n:4, topic:'9/11 Inside Job',
   question:'What did NIST officially conclude caused Building 7 to collapse on September 11th?',
   options:{A:'Pre-planted controlled demolition', B:'A thermite reaction in the steel columns', C:'Fire-induced progressive structural failure', D:'Secondary impact from the falling North Tower'},
   correct:'C',
   explanation:'NIST concluded fires burned for hours, weakening the internal steel structure until it failed progressively. No explosive residue was confirmed by any peer-reviewed study.'},
  {n:5, topic:'Rothschild',
   question:'The "Protocols of the Elders of Zion" (1903) were officially proven to be:',
   options:{A:'A genuine leaked document from a Jewish council', B:'Written by the Rothschild family as a planning guide', C:'A forgery fabricated by the Tsarist Russian secret police', D:'A French political satire misattributed to Jews'},
   correct:'C',
   explanation:'Exposed as a Tsarist forgery by 1921 and confirmed by multiple courts. Yet it remains one of the most cited antisemitic texts in history — proof that a debunked lie can outlive its refutation.'},
  {n:6, topic:'Israeli Lobby',
   question:'How much emergency military aid did US Congress approve for Israel in October 2023?',
   options:{A:'$3.8 billion (standard annual aid)', B:'$8.5 billion', C:'$17.9 billion', D:'$25 billion'},
   correct:'C',
   explanation:'$17.9 billion — one of the largest single emergency military aid packages approved by Congress since World War II, passed weeks after the October 7 attacks.'},
];

const PHASES = [
  'lobby',
  ...[1,2,3,4,5,6].flatMap(i => [`poll_${i}`, `poll_results_${i}`]),
  ...[1,2,3,4,5,6].flatMap(i => [`quiz_${i}`, `quiz_results_${i}`]),
  'leaderboard',
];

// ── ROUTING ───────────────────────────────────────────────────────────────────
const params    = new URLSearchParams(location.search);
const roomParam = params.get('room');
const dbParam   = params.get('db');

if (dbParam) {
  DB = decodeURIComponent(dbParam);
  localStorage.setItem('quiz_db', DB);
} else {
  DB = localStorage.getItem('quiz_db') || '';
}

if (roomParam) {
  runPlayer(roomParam.toUpperCase());
} else if (!DB) {
  runSetup();
} else {
  runHost();
}

// ══════════════════════════════════════════════════════════════════════════════
//  SETUP WIZARD
// ══════════════════════════════════════════════════════════════════════════════
function runSetup() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px">
      <div class="card" style="max-width:520px">
        <div class="tag">▣ ONE-TIME SETUP · 2 MINUTES</div>
        <h1 style="font-size:1.4rem;margin-bottom:6px">DATABASE SETUP</h1>
        <div style="font-size:.65rem;color:var(--dim);letter-spacing:3px;text-align:center;margin-bottom:18px">NEEDED ONCE — SAVES AUTOMATICALLY</div>
        <div class="divider"></div>

        <div class="setup-step"><span class="setup-num">1</span><span>Go to <a href="https://console.firebase.google.com" target="_blank" style="color:var(--red-bright)">console.firebase.google.com</a> → create a free project (any name)</span></div>
        <div class="setup-step"><span class="setup-num">2</span><span>In your project: click <b style="color:var(--text)">Build</b> → <b style="color:var(--text)">Realtime Database</b> → <b style="color:var(--text)">Create Database</b></span></div>
        <div class="setup-step"><span class="setup-num">3</span><span>Choose <b style="color:#ffcc44">Start in test mode</b> → Done</span></div>
        <div class="setup-step"><span class="setup-num">4</span><span>Copy the URL shown at the top (looks like <code style="color:#aaccff;font-size:.75rem">https://xxx-default-rtdb.firebaseio.com</code>)</span></div>
        <div class="setup-step"><span class="setup-num">5</span><span>Paste it below:</span></div>

        <input type="text" id="db-inp" placeholder="https://your-project-default-rtdb.firebaseio.com" style="font-size:.78rem;letter-spacing:1px;margin-top:6px">
        <button class="btn" onclick="saveDB()" style="margin-top:4px">▶ TEST & LAUNCH QUIZ</button>
        <div id="setup-msg" style="font-size:.7rem;letter-spacing:2px;margin-top:12px;line-height:1.8;display:none"></div>
        <div class="divider"></div>
        <div style="font-size:.6rem;color:var(--dim);letter-spacing:2px;line-height:2;text-align:center">
          Firebase free tier · no credit card · 100k reads/day<br>
          This replaces PeerJS which fails on school/mobile networks
        </div>
      </div>
    </div>`;
}

window.saveDB = async function() {
  const inp = document.getElementById('db-inp');
  const msg = document.getElementById('setup-msg');
  let url = (inp.value || '').trim().replace(/\/$/, '');

  if (!url.includes('firebaseio.com') && !url.includes('firebasedatabase.app')) {
    msg.style.color = '#ff5555';
    msg.textContent = '⚠ Invalid URL. Must contain firebaseio.com or firebasedatabase.app';
    msg.style.display = 'block';
    return;
  }

  msg.style.color = 'var(--dim)';
  msg.textContent = '▸ Testing connection…';
  msg.style.display = 'block';

  DB = url;
  try {
    const r = await fetch(`${DB}/_quiz_test_.json`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: '"ok"'
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ' — check test mode rules');
    await fetch(`${DB}/_quiz_test_.json`, {method: 'DELETE'});
    localStorage.setItem('quiz_db', DB);
    msg.style.color = '#4caf50';
    msg.textContent = '✓ Connected! Launching quiz…';
    setTimeout(runHost, 600);
  } catch(e) {
    msg.style.color = '#ff5555';
    msg.textContent = `⚠ Failed: ${e.message}`;
    DB = '';
  }
};

// ══════════════════════════════════════════════════════════════════════════════
//  HOST MODE
// ══════════════════════════════════════════════════════════════════════════════
function runHost() {
  const roomCode = Math.random().toString(36).substr(2,6).toUpperCase();
  const joinUrl  = `${location.origin}${location.pathname}?room=${roomCode}&db=${encodeURIComponent(DB)}`;

  let phaseIdx = 0;
  let phase    = 'lobby';
  let step     = 0;
  let snapshot = {};
  let qrDone   = false;

  (async () => {
    await fbDel(`rooms/${roomCode}`);
    await fbSet(`rooms/${roomCode}/state`, {phase, step, ts: Date.now(), results: null});
    renderHostFull();
    setInterval(async () => {
      const d = await fbGet(`rooms/${roomCode}`);
      if (d) { snapshot = d; renderHostFull(); }
    }, 1500);
  })();

  window.hostNext = async function() {
    if (phaseIdx >= PHASES.length - 1) return;
    phaseIdx++;
    phase = PHASES[phaseIdx];
    const m = phase.match(/_(\d+)$/);
    step = m ? parseInt(m[1]) : 0;

    // Get fresh player data before computing results
    const freshData  = await fbGet(`rooms/${roomCode}`);
    if (freshData) snapshot = freshData;
    const players    = snapshot.players || {};
    const pList      = Object.values(players);
    const pCount     = pList.length;
    let results      = null;

    if (phase.includes('poll_results')) {
      let yes = 0, no = 0;
      pList.forEach(p => {
        const v = (p.votes || {})[step];
        if (v === 'yes') yes++;
        else if (v === 'no') no++;
      });
      results = {yes, no, playerCount: pCount};
    }

    else if (phase.includes('quiz_results')) {
      const q = QUIZ[step - 1];
      const counts = {A:0, B:0, C:0, D:0};
      for (const [name, p] of Object.entries(players)) {
        const a = (p.answers || {})[step];
        if (a && counts[a] !== undefined) counts[a]++;
        if (a === q.correct) {
          await fbSet(`rooms/${roomCode}/players/${name}/score`, (p.score || 0) + 1);
        }
      }
      results = {...counts, playerCount: pCount};
    }

    else if (phase === 'leaderboard') {
      const freshPlayers = (await fbGet(`rooms/${roomCode}/players`)) || {};
      const lb = Object.entries(freshPlayers)
        .map(([n, p]) => ({name: n, score: p.score || 0}))
        .sort((a, b) => b.score - a.score);
      results = {leaderboard: lb};
    }

    await fbSet(`rooms/${roomCode}/state`, {phase, step, ts: Date.now(), results});
  };

  function players()  { return snapshot.players || {}; }
  function pNames()   { return Object.keys(players()); }
  function pCount()   { return pNames().length; }
  function stateRes() { return (snapshot.state || {}).results || {}; }

  function renderHostFull() {
    let mainHtml = '';
    let sideHtml = '';

    if (phase === 'lobby') {
      mainHtml = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;width:100%;">
          <div class="tag" style="margin-bottom:6px">▣ SCAN TO JOIN</div>
          <div style="font-family:var(--title);font-size:3.5rem;letter-spacing:.25em;color:var(--red-bright);line-height:1;margin-bottom:18px">${roomCode}</div>
          <div class="qr-box" id="host-qr" style="margin:0 auto"></div>
          <div style="font-size:.68rem;color:rgba(200,120,80,.55);letter-spacing:1px;margin-top:14px;max-width:480px;word-break:break-all">${joinUrl}</div>
          <div style="margin-top:20px;font-size:.68rem;color:var(--dim);letter-spacing:3px;line-height:2.2">
            STUDENTS: scan the QR &nbsp;·&nbsp; enter a codename &nbsp;·&nbsp; wait for host
          </div>
        </div>`;
      sideHtml = `
        <div class="tag">CONNECTED — ${pCount()}</div>
        ${pNames().map(p => `<div class="player-pill">▸ ${p}</div>`).join('') || '<div style="color:var(--dim);font-size:.65rem;letter-spacing:2px">No players yet…</div>'}`;
    }

    else if (phase.startsWith('poll_') && !phase.includes('results')) {
      const p = POLLS[step - 1];
      let yes = 0, no = 0;
      Object.values(players()).forEach(pl => {
        const v = (pl.votes || {})[step];
        if (v === 'yes') yes++;
        else if (v === 'no') no++;
      });
      const voted = yes + no;
      mainHtml = `
        <div class="topic-badge">POLL ${step} / 6</div>
        <h2>${p.topic.toUpperCase()}</h2>
        <div class="divider"></div>
        <div class="q-text">${p.question}</div>
        <div class="divider"></div>
        <div class="live-big">${voted} / ${pCount()}</div>
        <div style="font-size:.65rem;letter-spacing:3px;color:var(--dim);margin-top:4px">VOTES CAST</div>`;
      sideHtml = `
        <div class="tag">LIVE VOTES</div>
        <div style="font-size:1.4rem;font-family:var(--title);color:#4caf50;margin:6px 0">YES: ${yes}</div>
        <div style="font-size:1.4rem;font-family:var(--title);color:#ff5555">NO: ${no}</div>`;
    }

    else if (phase.includes('poll_results')) {
      const p   = POLLS[step - 1];
      const res = stateRes();
      const tot = Math.max(1, (res.yes || 0) + (res.no || 0));
      const yp  = Math.round((res.yes || 0) / tot * 100);
      const np  = Math.round((res.no  || 0) / tot * 100);
      mainHtml = `
        <div class="topic-badge">POLL ${step} RESULTS</div>
        <h2>${p.topic.toUpperCase()}</h2>
        <div class="divider"></div>
        ${hBar('CLASS — YES', yp, 'fill-yes')}
        ${hBar('CLASS — NO',  np, 'fill-no')}
        <div class="divider"></div>
        ${hBar('NATIONAL AVERAGE', p.stat, 'fill-nat', true)}
        <div class="stat-note">${p.statLabel}</div>`;
      sideHtml = `
        <div class="tag">RESULT</div>
        <div style="font-size:2rem;font-family:var(--title);color:#4caf50">${yp}% YES</div>
        <div style="font-size:2rem;font-family:var(--title);color:#ff5555">${np}% NO</div>
        <div class="divider"></div>
        <div style="font-size:.65rem;letter-spacing:3px;color:#3a8acc">NATIONAL: ${p.stat}%</div>`;
    }

    else if (phase.startsWith('quiz_') && !phase.includes('results')) {
      const q = QUIZ[step - 1];
      let answered = 0;
      const counts = {A:0, B:0, C:0, D:0};
      Object.values(players()).forEach(pl => {
        const a = (pl.answers || {})[step];
        if (a && counts[a] !== undefined) { counts[a]++; answered++; }
      });
      mainHtml = `
        <div class="topic-badge">QUESTION ${step} / 6 · ${q.topic.toUpperCase()}</div>
        <h2>QUESTION ${step}</h2>
        <div class="divider"></div>
        <div class="q-text">${q.question}</div>
        ${['A','B','C','D'].map(k=>`<div class="opt-row"><span class="opt-key">${k}</span>${q.options[k]}</div>`).join('')}
        <div class="divider"></div>
        <div class="live-big">${answered} / ${pCount()}</div>
        <div style="font-size:.65rem;letter-spacing:3px;color:var(--dim);margin-top:4px">ANSWERS IN</div>`;
      sideHtml = `
        <div class="tag">LIVE ANSWERS</div>
        ${['A','B','C','D'].map(k=>`<div style="font-size:1.1rem;font-family:var(--title);color:var(--paper);margin:5px 0">${k}: ${counts[k]}</div>`).join('')}`;
    }

    else if (phase.includes('quiz_results')) {
      const q    = QUIZ[step - 1];
      const res  = stateRes();
      const tot  = Math.max(1, pCount());
      const fills = {A:'fill-a', B:'fill-b', C:'fill-c', D:'fill-d'};
      mainHtml = `
        <div class="topic-badge">QUESTION ${step} RESULTS · CORRECT: ${q.correct}</div>
        <h2>${q.topic.toUpperCase()}</h2>
        <div class="divider"></div>
        <div class="q-text">${q.question}</div>
        ${['A','B','C','D'].map(k => {
          const cnt = res[k] || 0;
          const pct = Math.round(cnt / tot * 100);
          const isC = k === q.correct;
          return `<div class="hbar-row">
            <div class="hbar-lbl"><span style="${isC?'color:#4caf50':''}">${k}. ${q.options[k]}${isC?' ✓':''}</span><span>${cnt} (${pct}%)</span></div>
            <div class="bar-track"><div class="bar-fill ${fills[k]}" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')}
        <div class="explanation">${q.explanation}</div>`;
      sideHtml = `
        <div class="tag">STATS</div>
        ${['A','B','C','D'].map(k => {
          const cnt = res[k] || 0;
          const pct = Math.round(cnt / tot * 100);
          const isC = k === q.correct;
          return `<div style="font-size:1rem;font-family:var(--title);color:${isC?'#4caf50':'var(--paper)'};margin:5px 0">${k}: ${cnt} (${pct}%)${isC?' ✓':''}</div>`;
        }).join('')}`;
    }

    else if (phase === 'leaderboard') {
      const lb = (stateRes().leaderboard) ||
        Object.entries(players()).map(([n,p])=>({name:n,score:p.score||0})).sort((a,b)=>b.score-a.score);
      mainHtml = `
        <div class="tag">▣ FINAL DECLASSIFICATION</div>
        <h2>LEADERBOARD</h2>
        <div class="divider"></div>
        ${lb.map((p,i)=>{
          const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
          return `<div class="lb-row"><span class="lb-rank">${medal}</span><span class="lb-name">${p.name}</span><span class="lb-score">${p.score}/6</span></div>`;
        }).join('') || '<div style="color:var(--dim)">No players</div>'}`;
      sideHtml = `<div class="tag">FINAL SCORES</div>
        ${(stateRes().leaderboard || []).map(p=>`<div class="player-pill">${p.name}: ${p.score}/6</div>`).join('')}`;
    }

    document.getElementById('app').innerHTML = `
      <div id="host-topbar">
        <div class="logo">▣ ARCHIVES — HOST</div>
        <div id="host-phase">${phase.replace(/_/g,' ').toUpperCase()}</div>
        <div id="host-pcount">${pCount()} PLAYER${pCount()!==1?'S':''}</div>
      </div>
      <div id="host-wrap">
        <div id="host-main">${mainHtml}</div>
        <div id="host-side">
          ${sideHtml}
          <button class="next-btn" onclick="hostNext()">NEXT ▶</button>
        </div>
      </div>`;

    if (phase === 'lobby' && !qrDone) {
      const el = document.getElementById('host-qr');
      if (el && typeof QRCode !== 'undefined') {
        new QRCode(el, {text: joinUrl, width:380, height:380, colorDark:'#000000', colorLight:'#ffffff'});
        qrDone = true;
      }
    }
    if (phase !== 'lobby') qrDone = false;
  }

  function hBar(label, pct, fillClass, blue=false) {
    const col = blue ? '#3a8acc' : 'var(--paper)';
    return `<div class="hbar-row">
      <div class="hbar-lbl" style="color:${col}"><span>${label}</span><span>${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill ${fillClass}" style="width:${pct}%">${pct>8?pct+'%':''}</div></div>
    </div>`;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  PLAYER MODE
// ══════════════════════════════════════════════════════════════════════════════
function runPlayer(roomCode) {
  let myName       = localStorage.getItem('quiz_name') || '';
  let currentState = null;
  let myVotes      = {};   // step → 'yes'|'no'
  let myAnswers    = {};   // step → 'A'|'B'|'C'|'D'
  let myScore      = 0;
  let scoredSteps  = new Set();
  let pollInterval = null;

  document.getElementById('score-badge').style.display = 'block';

  if (!myName) renderNameEntry();
  else joinRoom();

  function renderNameEntry() {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px">
        <div class="card">
          <div class="tag">▣ ROOM ${roomCode}</div>
          <h1>ARCHIVES<br>OF THE UNKNOWN</h1>
          <div class="divider"></div>
          <input type="text" id="ni" placeholder="Enter your codename…" maxlength="18" autocomplete="off"
            onkeydown="if(event.key==='Enter')joinAs()">
          <button class="btn" onclick="joinAs()">▶ ACCESS THE VAULT</button>
        </div>
      </div>`;
  }

  window.joinAs = async function() {
    const n = (document.getElementById('ni') || {}).value;
    if (!n || !n.trim()) return;
    myName = n.trim().replace(/[.#$\[\]/]/g, '_');
    localStorage.setItem('quiz_name', myName);
    await joinRoom();
  };

  async function joinRoom() {
    setMsg('Connecting…');

    // Verify room exists
    const state = await fbGet(`rooms/${roomCode}/state`);
    if (!state) {
      setMsg(`Room not found.<br><span style="color:var(--dim);font-size:.8rem">Ask the host to open the quiz, then <button class="btn" onclick="location.reload()" style="display:inline;width:auto;padding:4px 12px;font-size:.7rem;margin:0 4px">retry</button></span>`);
      return;
    }

    // Register player
    await fbSet(`rooms/${roomCode}/players/${myName}`, {score: 0, joinedAt: Date.now()});

    currentState = state;
    renderPlayer(state);

    pollInterval = setInterval(async () => {
      const s = await fbGet(`rooms/${roomCode}/state`);
      if (s && JSON.stringify(s) !== JSON.stringify(currentState)) {
        currentState = s;
        renderPlayer(s);
      }
    }, 2000);
  }

  function setMsg(msg) {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px">
        <div class="card" style="text-align:center">
          <div class="tag">▣ ROOM ${roomCode}</div>
          <h1 style="font-size:1.4rem;margin-bottom:14px">ARCHIVES</h1>
          <div class="divider"></div>
          <div style="font-size:.75rem;letter-spacing:2px;color:var(--dim);line-height:2.2">${msg}</div>
          <div class="waiting-anim" style="margin-top:24px">▸ ▸ ▸</div>
        </div>
      </div>`;
  }

  window.playerVote = async function(v) {
    if (!currentState) return;
    const s = currentState.step;
    myVotes[s] = v;
    await fbSet(`rooms/${roomCode}/players/${myName}/votes/${s}`, v);
    renderPlayer(currentState);
  };

  window.playerAnswer = async function(a) {
    if (!currentState) return;
    const s = currentState.step;
    myAnswers[s] = a;
    await fbSet(`rooms/${roomCode}/players/${myName}/answers/${s}`, a);
    renderPlayer(currentState);
  };

  function renderPlayer(s) {
    const sc = document.getElementById('sc');
    if (sc) sc.textContent = myScore;

    const ph   = s.phase || 'lobby';
    const step = s.step  || 0;
    const res  = s.results || {};
    let html   = '';

    if (ph === 'lobby') {
      html = wrap(`
        <div class="tag">▣ SECURE CHANNEL</div>
        <h1>ACCESS GRANTED</h1>
        <div class="divider"></div>
        <div style="font-size:.8rem;color:var(--dim);letter-spacing:2px;line-height:2.4;text-align:center">
          AGENT: ${myName}<br>ROOM: ${roomCode}<br><br>AWAITING HOST COMMAND…
        </div>
        <div class="waiting-anim">▸ ▸ ▸</div>`);
    }

    else if (ph.startsWith('poll_') && !ph.includes('results')) {
      const p = POLLS[step - 1];
      if (myVotes[step]) {
        html = waitingBox('VOTE RECORDED', 'Waiting for all votes…');
      } else {
        html = wrap(`
          <div class="tag">▣ POLL ${step} / 6 · ${p.topic.toUpperCase()}</div>
          <div class="divider"></div>
          <div class="q-text">${p.question}</div>
          <div class="vote-row">
            <button class="btn btn-green" onclick="playerVote('yes')">✓ YES</button>
            <button class="btn btn-red-dark" onclick="playerVote('no')">✗ NO</button>
          </div>`);
      }
    }

    else if (ph.includes('poll_results')) {
      const p   = POLLS[step - 1];
      const tot = Math.max(1, (res.yes || 0) + (res.no || 0));
      const yp  = Math.round((res.yes || 0) / tot * 100);
      const np  = Math.round((res.no  || 0) / tot * 100);
      html = wrap(`
        <div class="tag">▣ POLL ${step} RESULTS</div>
        <h2>${p.topic.toUpperCase()}</h2>
        <div class="divider"></div>
        ${pBar('OUR CLASS — YES', yp, 'fill-yes')}
        ${pBar('OUR CLASS — NO',  np, 'fill-no')}
        <div class="divider"></div>
        ${pBar('NATIONAL', p.stat, 'fill-nat', true)}
        <div class="stat-note">${p.statLabel}</div>`);
    }

    else if (ph.startsWith('quiz_') && !ph.includes('results')) {
      const q = QUIZ[step - 1];
      if (myAnswers[step]) {
        html = waitingBox('ANSWER LOCKED IN', 'Waiting for all players…');
      } else {
        const opts = ['A','B','C','D'].map(k =>
          `<button class="ans-btn" onclick="playerAnswer('${k}')"><span class="ans-key">${k}</span><span>${q.options[k]}</span></button>`
        ).join('');
        html = wrap(`
          <div class="tag">▣ QUESTION ${step} / 6 · ${q.topic.toUpperCase()}</div>
          <div class="divider"></div>
          <div class="q-text">${q.question}</div>
          ${opts}`);
      }
    }

    else if (ph.includes('quiz_results')) {
      const q      = QUIZ[step - 1];
      const myAns  = myAnswers[step] || '';
      const wasOk  = myAns === q.correct;
      if (wasOk && !scoredSteps.has(step)) { myScore++; scoredSteps.add(step); if (sc) sc.textContent = myScore; }
      const ops = ['A','B','C','D'].map(k => {
        let cls = '';
        if (k === q.correct)                    cls = 'correct';
        else if (k === myAns && k !== q.correct) cls = 'selected-wrong';
        return `<button class="ans-btn ${cls}" disabled><span class="ans-key">${k}</span><span>${q.options[k]}</span></button>`;
      }).join('');
      const msg = myAns
        ? (wasOk ? `<div class="result-ok">✓ CORRECT — +1 POINT</div>` : `<div class="result-no">✗ WRONG</div>`)
        : `<div class="result-no">— DID NOT ANSWER</div>`;
      html = wrap(`
        <div class="tag">▣ QUESTION ${step} RESULTS</div>
        <h2>${q.topic.toUpperCase()}</h2>
        <div class="divider"></div>
        ${ops}
        ${msg}
        <div class="explanation">${q.explanation}</div>`);
    }

    else if (ph === 'leaderboard') {
      const lb     = res.leaderboard || [];
      const myRank = lb.findIndex(p => p.name === myName) + 1;
      const me     = lb.find(p => p.name === myName);
      if (sc) sc.textContent = me ? me.score : myScore;
      const rows = lb.map((p, i) => {
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
        return `<div class="lb-row ${p.name===myName?'me':''}">
          <span class="lb-rank">${medal}</span>
          <span class="lb-name">${p.name}</span>
          <span class="lb-score">${p.score}/6</span>
        </div>`;
      }).join('');
      html = wrap(`
        <div class="tag">▣ FINAL LEADERBOARD</div>
        <h1>DECLASSIFIED</h1>
        <div class="divider"></div>
        ${rows || '<div style="color:var(--dim)">No results yet</div>'}
        <div style="margin-top:18px;text-align:center;font-size:.7rem;letter-spacing:3px;color:var(--dim)">
          YOUR RANK: ${myRank||'—'} / ${lb.length} &nbsp;·&nbsp; SCORE: ${me?me.score:myScore}/6
        </div>`);
    }

    else {
      html = wrap(`<div class="waiting-anim">▸ ▸ ▸</div>`);
    }

    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:20px 16px 40px">
        ${html}
      </div>`;
  }

  function wrap(content) {
    return `<div class="card" style="margin-top:16px">${content}</div>`;
  }
  function waitingBox(title, subtitle) {
    return wrap(`
      <div class="tag">▣ ${title}</div>
      <div class="divider"></div>
      <div class="answered-box">${subtitle}</div>
      <div class="waiting-anim">▸ ▸ ▸</div>`);
  }
  function pBar(label, pct, fillClass, blue=false) {
    const col = blue ? '#3a8acc' : 'var(--paper)';
    return `<div class="bar-row">
      <div class="bar-lbl" style="color:${col}"><span>${label}</span><span>${pct}%</span></div>
      <div class="bar-track"><div class="bar-fill ${fillClass}" style="width:${pct}%">${pct>10?pct+'%':''}</div></div>
    </div>`;
  }
}
</script>
</body>
</html>
